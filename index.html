<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Задачи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --line:#ECEAE3; --muted:#8A8880; --bg:#F6F5F1; --accent:#185FA5; --ink:#22211D; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
        color:var(--ink); background:#fff; display:flex; flex-direction:column; overscroll-behavior:none; }
  header{ padding:16px 18px 12px; position:relative; }
  h1{ font-size:22px; font-weight:600; margin:0; letter-spacing:-.01em; }
  .sub{ font-size:13px; color:var(--muted); margin-top:2px; }
  .add{ position:absolute; top:14px; right:16px; width:34px; height:34px; border-radius:50%;
        background:var(--accent); color:#fff; border:none; font-size:22px; line-height:1;
        display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(24,95,165,.25); }
  .weekbar{ display:flex; align-items:center; justify-content:space-between; padding:2px 18px 6px; }
  .weekbar .rng{ font-size:13px; font-weight:500; }
  .weekbar button{ background:none; border:none; color:#B4B2A9; font-size:20px; padding:2px 8px; }
  .week{ display:grid; grid-template-columns:repeat(7,1fr); gap:4px; text-align:center; padding:0 12px 8px; }
  .week .wd{ font-size:11px; color:#B7B5AC; }
  .day{ padding:7px 0 5px; border-radius:11px; font-size:15px; margin-top:3px; transition:.12s; }
  .day.sel{ background:var(--accent); color:#fff; font-weight:600; }
  .dot{ width:5px; height:5px; border-radius:50%; margin:3px auto 0; }
  .filters{ display:flex; gap:7px; overflow-x:auto; padding:6px 16px 12px; font-size:13px; scrollbar-width:none; }
  .filters::-webkit-scrollbar{ display:none; }
  .chip{ border:1px solid #DEDCD3; padding:6px 12px; border-radius:22px; white-space:nowrap; background:#fff; color:#4A4842; }
  .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  main{ flex:1; overflow-y:auto; background:var(--bg); -webkit-overflow-scrolling:touch; }
  #list{ padding:12px 14px 24px; }
  .card{ display:flex; align-items:stretch; background:#fff; border-radius:14px; overflow:hidden;
         margin-bottom:9px; box-shadow:0 1px 2px rgba(20,20,20,.05); transition:.22s; }
  .card:active{ transform:scale(.99); }
  .band{ width:44px; flex:none; color:#fff; display:flex; align-items:center; justify-content:center;
         font-size:14px; font-weight:600; }
  .cbody{ padding:11px 12px; flex:1; min-width:0; }
  .ttl{ font-size:15px; font-weight:500; margin-bottom:6px; line-height:1.25; word-break:break-word; }
  .meta{ display:flex; align-items:center; gap:9px; font-size:12px; flex-wrap:wrap; }
  .cat{ padding:3px 9px; border-radius:22px; font-weight:500; }
  .dl{ display:inline-flex; align-items:center; gap:4px; color:var(--muted); }
  .cb{ width:24px; height:24px; border:2px solid #C9C7BE; border-radius:7px; align-self:center;
       margin:0 13px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; flex:none; }
  .cb.on{ background:#1D9E75; border-color:#1D9E75; }
  .ghead{ display:flex; align-items:center; gap:6px; font-size:13px; color:#6B6963; font-weight:600; margin:12px 4px 8px; }
  .empty{ text-align:center; color:#B7B5AC; padding:64px 20px; }
  .empty .big{ font-size:40px; margin-bottom:10px; }
  nav{ display:grid; grid-template-columns:repeat(4,1fr); background:#fff; border-top:1px solid var(--line);
       text-align:center; font-size:10.5px; padding:7px 0 max(9px, env(safe-area-inset-bottom)); }
  nav div{ color:#B4B2A9; padding:2px 0; }
  nav div.on{ color:var(--accent); }
  nav .ic{ font-size:21px; display:block; margin-bottom:1px; }
  .scrim{ position:fixed; inset:0; background:rgba(15,15,15,.4); display:none; align-items:flex-end; z-index:20; }
  .scrim.on{ display:flex; }
  .panel{ background:#fff; width:100%; border-radius:20px 20px 0 0; padding:18px 18px max(18px, env(safe-area-inset-bottom));
          max-height:92vh; overflow-y:auto; animation:up .22s ease; }
  @keyframes up{ from{ transform:translateY(30px); opacity:.6 } to{ transform:none; opacity:1 } }
  .panel h2{ font-size:18px; margin:0 0 16px; }
  .fld{ margin-bottom:14px; }
  .fld label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:7px; font-weight:600; }
  input[type=text], input[type=datetime-local]{ width:100%; padding:12px 13px; border:1px solid #DEDCD3;
         border-radius:12px; font-size:16px; font-family:inherit; background:#fff; color:var(--ink); }
  input:focus{ outline:none; border-color:var(--accent); }
  .row{ display:flex; gap:7px; flex-wrap:wrap; }
  .btn{ width:100%; padding:14px; border:none; border-radius:13px; background:var(--accent); color:#fff;
        font-size:16px; font-weight:600; margin-top:6px; }
  .btn.ghost{ background:#F1EFE8; color:#5F5E5A; }
  .btn.danger{ background:#FCEBEB; color:#A32D2D; }
  .cmt{ border-left:2px solid var(--line); padding-left:11px; margin-bottom:12px; }
  .cmt .t{ font-size:11px; color:#B4B2A9; margin-bottom:3px; }
  .cmt .b{ font-size:14px; line-height:1.5; }
  .cmtbar{ display:flex; gap:8px; margin-top:8px; }
  .cmtbar input{ flex:1; }
  .cmtbar button{ width:auto; padding:12px 16px; margin:0; }
  .srow{ display:flex; align-items:center; justify-content:space-between; padding:13px 14px; }
  .sgroup{ background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(20,20,20,.05); }
  .sgroup .srow + .srow{ border-top:1px solid #F0EEE7; }
  .slabel{ font-size:11px; color:#B4B2A9; text-transform:uppercase; letter-spacing:.05em; margin:18px 6px 8px; font-weight:600; }
  .tg{ width:42px; height:25px; border-radius:22px; position:relative; flex:none; transition:.15s; }
  .tg i{ position:absolute; top:2.5px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.15s; }
  .val{ color:var(--muted); font-size:14px; display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
  <header>
    <h1 id="title">Сегодня</h1>
    <div class="sub" id="sub"></div>
    <button class="add" id="addBtn" aria-label="Добавить">+</button>
  </header>
  <div class="weekbar" id="weekbar" style="display:none">
    <button id="wPrev">‹</button><span class="rng" id="wRange"></span><button id="wNext">›</button>
  </div>
  <div class="week" id="week" style="display:none"></div>
  <div class="filters" id="filters"></div>

  <main><div id="list"><div class="empty"><div class="big">⏳</div>Загрузка…</div></div></main>

  <nav id="nav">
    <div data-tab="calendar"><span class="ic">🗓</span>Календарь</div>
    <div data-tab="today" class="on"><span class="ic">☀️</span>Сегодня</div>
    <div data-tab="all"><span class="ic">📋</span>Все</div>
    <div data-tab="settings"><span class="ic">⚙️</span>Настройки</div>
  </nav>

  <div class="scrim" id="taskScrim"><div class="panel">
    <h2 id="tsTitle">Новая задача</h2>
    <div class="fld"><label>Название</label><input type="text" id="fTitle" placeholder="Купить кофе"></div>
    <div class="fld"><label>Категория</label><div class="row" id="fCat"></div></div>
    <div class="fld"><label>Приоритет</label><div class="row" id="fPrio"></div></div>
    <div class="fld"><label>Дедлайн (день и время до минуты)</label><input type="datetime-local" id="fDue"></div>
    <div id="cmtWrap" style="display:none">
      <div class="fld" style="margin-bottom:6px"><label>Комментарии</label></div>
      <div id="cmtList"></div>
      <div class="cmtbar"><input type="text" id="cmtInput" placeholder="Написать комментарий…"><button class="btn" id="cmtAdd">→</button></div>
    </div>
    <button class="btn" id="fSave" style="margin-top:14px">Сохранить</button>
    <button class="btn danger" id="fDelete" style="display:none">Удалить задачу</button>
    <button class="btn ghost" id="fCancel">Отмена</button>
  </div></div>

  <div class="scrim" id="catScrim"><div class="panel">
    <h2 id="csTitle">Категория</h2>
    <div class="fld"><label>Название</label><input type="text" id="cName" placeholder="учёба"></div>
    <div class="fld"><label>Эмодзи</label><input type="text" id="cEmoji" placeholder="📚" maxlength="4"></div>
    <div class="fld"><label>Цвет</label><div class="row" id="cColors"></div></div>
    <button class="btn" id="cSave">Сохранить</button>
    <button class="btn danger" id="cDelete" style="display:none">Удалить категорию</button>
    <button class="btn ghost" id="cCancel">Отмена</button>
  </div></div>

  <div class="scrim" id="optScrim"><div class="panel">
    <h2 id="optTitle">Выбор</h2>
    <div id="optList"></div>
    <button class="btn ghost" id="optCancel" style="margin-top:8px">Отмена</button>
  </div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
const PCOL = {P1:'#E24B4A',P2:'#D85A30',P3:'#EF9F27',P4:'#378ADD',P5:'#888780'};
const PALETTE = ['#639922','#378ADD','#1D9E75','#7F77DD','#D85A30','#E24B4A','#EF9F27','#888780'];
const state = { tab:'today', tasks:[], cats:[], cat:'', selDay:null, weekOff:0, editId:null, catEdit:null, settings:{} };
function S(k, def){ return (state.settings && state.settings[k]!=null && state.settings[k]!=='') ? state.settings[k] : def; }

function catMeta(name){ const c=state.cats.find(x=>x.name===name); return c||{name,emoji:'',color:'#888780'}; }
function tint(hex){ return hex+'22'; }

async function api(path, opts={}) {
  const r = await fetch(path, Object.assign({}, opts, { headers: Object.assign({
    'Content-Type':'application/json', 'X-Telegram-Init-Data': tg?tg.initData:'' }, opts.headers||{}) }));
  if (r.status===401){ document.getElementById('list').innerHTML='<div class="empty"><div class="big">🔒</div>Доступ только у владельца</div>'; throw new Error('401'); }
  if (!r.ok) throw new Error('api '+r.status);
  const txt = await r.text(); return txt?JSON.parse(txt):null;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function parseDue(s){ if(!s) return null; const d=new Date(s.replace(' ','T')); return isNaN(d)?null:d; }
function defaultDueLocal(){ const d=new Date(); d.setHours(d.getHours()+1,0,0,0);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
function urgency(due){
  if(!due) return {text:'',emoji:''};
  const ms=due-new Date();
  if(ms<0) return {text:'просрочено',emoji:'🔥',over:true};
  const m=Math.floor(ms/60000),d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mi=m%60;
  const text=(d?d+'д ':'')+((h||d)?h+'ч ':'')+mi+'м';
  const gh=+S('urg_green_h',48)*3600000, yh=+S('urg_yellow_h',24)*3600000, oh=+S('urg_orange_h',12)*3600000;
  const emoji=ms>gh?'🟢':ms>yh?'🟡':ms>oh?'🟠':'🔴';
  return {text,emoji};
}

function cardHTML(t){
  const c=catMeta(t.category), u=urgency(parseDue(t.due_at)), p=t.priority||'P3';
  return `<div class="card" data-id="${t.id}">
    <div class="band" style="background:${PCOL[p]||'#888780'}">${p}</div>
    <div class="cbody" data-open="${t.id}">
      <div class="ttl">${esc(t.title)}</div>
      <div class="meta">
        ${t.category?`<span class="cat" style="background:${tint(c.color)};color:${c.color}">${c.emoji} ${t.category}</span>`:''}
        ${t.due_at?`<span class="dl" style="color:${u.over?'#A32D2D':'var(--muted)'}">⏰ ${u.text}</span><span>${u.emoji}</span>`:''}
      </div>
    </div>
    <div class="cb" data-done="${t.id}"></div>
  </div>`;
}
function bind(){
  document.querySelectorAll('[data-done]').forEach(cb=>cb.onclick=async e=>{
    e.stopPropagation(); const id=cb.getAttribute('data-done');
    cb.classList.add('on'); cb.textContent='✓';
    try{ await api('/api/tasks/'+id+'/done',{method:'POST'}); state.tasks=state.tasks.filter(t=>t.id!==id);
      const card=cb.closest('.card'); card.style.opacity='0'; card.style.transform='translateX(14px)'; setTimeout(render,220);
    }catch(err){ cb.classList.remove('on'); cb.textContent=''; }
  });
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openTask(el.getAttribute('data-open')));
}
function byPrio(a,b){ const o=x=>{const d=parseDue(x.due_at);return d&&d<new Date()?0:1;}; return o(a)-o(b)||(a.priority||'P3').localeCompare(b.priority||'P3'); }
function visible(){ let t=state.tasks.slice(); if(state.cat) t=t.filter(x=>x.category===state.cat); return t; }

function render(){
  document.querySelectorAll('nav div').forEach(d=>d.classList.toggle('on',d.dataset.tab===state.tab));
  const isSet=state.tab==='settings', isCal=state.tab==='calendar';
  document.getElementById('addBtn').style.display=isSet?'none':'flex';
  document.getElementById('weekbar').style.display=isCal?'flex':'none';
  document.getElementById('week').style.display=isCal?'grid':'none';
  document.getElementById('filters').style.display=isSet?'none':'flex';
  if(!isSet) renderFilters();
  if(isSet){ renderSettings(); return; }

  let items=visible(); const now=new Date();
  const title=document.getElementById('title'), sub=document.getElementById('sub');
  if(state.tab==='today'){ title.textContent='Сегодня';
    const end=new Date(now); end.setHours(23,59,59,0);
    items=items.filter(t=>{const d=parseDue(t.due_at);return d&&d<=end;});
    sub.textContent=now.toLocaleDateString('ru-RU',{weekday:'long',day:'numeric',month:'long'});
  } else if(isCal){ title.textContent='Календарь'; sub.textContent=''; renderWeek();
    const sel=state.selDay||now; items=items.filter(t=>{const d=parseDue(t.due_at);return d&&d.toDateString()===sel.toDateString();});
  } else { title.textContent='Все задачи'; sub.textContent=items.length+' задач'; }

  const list=document.getElementById('list');
  if(!items.length){ list.innerHTML='<div class="empty"><div class="big">🗒️</div>Задач нет</div>'; return; }
  if(state.tab==='all'){
    const g={}; items.forEach(t=>{(g[t.category||'без категории']=g[t.category||'без категории']||[]).push(t);});
    list.innerHTML=Object.keys(g).map(k=>`<div class="ghead">${catMeta(k).emoji} ${k} · ${g[k].length}</div>`+g[k].sort(byPrio).map(cardHTML).join('')).join('');
  } else { items.sort(byPrio); list.innerHTML=items.map(cardHTML).join(''); }
  bind();
}
function renderFilters(){
  const f=document.getElementById('filters');
  let h=`<span class="chip ${state.cat===''?'on':''}" data-c="">Все</span>`;
  state.cats.forEach(c=>h+=`<span class="chip ${state.cat===c.name?'on':''}" data-c="${c.name}">${c.emoji} ${c.name}</span>`);
  f.innerHTML=h;
  f.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{state.cat=ch.dataset.c;render();});
}
function renderWeek(){
  const base=new Date(); base.setHours(0,0,0,0); base.setDate(base.getDate()+state.weekOff*7);
  const mon=new Date(base); mon.setDate(base.getDate()-((base.getDay()+6)%7));
  const end=new Date(mon); end.setDate(mon.getDate()+6);
  document.getElementById('wRange').textContent=mon.getDate()+'–'+end.getDate()+' '+end.toLocaleDateString('ru-RU',{month:'long'});
  const names=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'], sel=state.selDay||new Date(), today=new Date();
  let h='';
  for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i);
    const has=state.tasks.some(t=>{const td=parseDue(t.due_at);return td&&td.toDateString()===d.toDateString();});
    const isSel=d.toDateString()===sel.toDateString(), isToday=d.toDateString()===today.toDateString();
    h+=`<div><div class="wd">${names[i]}</div><div class="day ${isSel?'sel':''}" data-day="${d.toISOString()}" style="${isToday&&!isSel?'color:var(--accent)':''}">${d.getDate()}<div class="dot" style="background:${has?(isSel?'#fff':'#378ADD'):'transparent'}"></div></div></div>`;
  }
  const w=document.getElementById('week'); w.innerHTML=h;
  w.querySelectorAll('.day').forEach(el=>el.onclick=()=>{state.selDay=new Date(el.dataset.day);render();});
}
document.getElementById('wPrev').onclick=()=>{state.weekOff--;render();};
document.getElementById('wNext').onclick=()=>{state.weekOff++;render();};

function tgHTML(on){ return `<span class="tg" style="background:${on?'#1D9E75':'#D3D1C7'}"><i style="left:${on?'19px':'2.5px'}"></i></span>`; }
const NAG={"30":"раз в 30 мин","60":"раз в час","120":"раз в 2 часа","180":"раз в 3 часа","0":"выключено"};
const LEAD={"0":"выключено","15":"за 15 мин","30":"за 30 мин","60":"за 1 час","120":"за 2 часа","1440":"за день"};
const THEME={"auto":"как в Telegram","light":"светлая","dark":"тёмная"};
function urgLabel(){ const g=+S('urg_green_h',48); return g>=72?'мягкие':(g<=24?'жёсткие':'стандарт'); }
function opt(label,patch){ return {label,patch}; }

function renderSettings(){
  document.getElementById('title').textContent='Настройки'; document.getElementById('sub').textContent='';
  const tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
  const cats=state.cats.map(c=>`<div class="srow catrow" data-c="${c.name}"><span>${c.emoji} ${c.name}</span><span class="val"><span style="width:12px;height:12px;border-radius:50%;background:${c.color};display:inline-block"></span>›</span></div>`).join('');
  document.getElementById('list').innerHTML=`
    <div class="slabel">Категории</div>
    <div class="sgroup">${cats}<div class="srow" id="addCat" style="color:var(--accent);font-weight:500">+ Добавить категорию</div></div>
    <div class="slabel">Задачи</div>
    <div class="sgroup">
      <div class="srow" id="sPrio"><span>Приоритет по умолчанию</span><span class="val">${S('default_priority','P3')} ›</span></div>
      <div class="srow" id="sUrg"><span>Пороги срочности 🟢🟡🟠🔴</span><span class="val">${urgLabel()} ›</span></div>
    </div>
    <div class="slabel">Напоминания</div>
    <div class="sgroup">
      <div class="srow" id="sNag"><span>Пинать при просрочке</span><span class="val">${NAG[S('nag_interval_min','60')]||'раз в час'} ›</span></div>
      <div class="srow" id="sLead"><span>Напоминать заранее</span><span class="val">${LEAD[S('lead_time_min','60')]||'за 1 час'} ›</span></div>
      <div class="srow"><span>Тихие часы (${S('quiet_start','23:00')}–${S('quiet_end','08:00')})</span><span class="tg2" data-k="quiet_on">${tgHTML(S('quiet_on','1')==='1')}</span></div>
      <div class="srow"><span>Утренний дайджест (${S('digest_time','08:00')})</span><span class="tg2" data-k="digest_on">${tgHTML(S('digest_on','1')==='1')}</span></div>
    </div>
    <div class="slabel">Время</div>
    <div class="sgroup"><div class="srow"><span>Часовой пояс</span><span class="val">авто · ${tz}</span></div></div>
    <div class="slabel">Оформление</div>
    <div class="sgroup"><div class="srow" id="sTheme"><span>Тема</span><span class="val">${THEME[S('theme','auto')]||'как в Telegram'} ›</span></div></div>
    <div style="height:24px"></div>`;
  document.getElementById('addCat').onclick=()=>openCat(null);
  document.querySelectorAll('.catrow').forEach(r=>r.onclick=()=>openCat(r.dataset.c));
  document.getElementById('sPrio').onclick=()=>openOpts('Приоритет по умолчанию',['P1','P2','P3','P4','P5'].map(p=>opt(p,{default_priority:p})));
  document.getElementById('sUrg').onclick=()=>openOpts('Пороги срочности',[
    opt('мягкие (🟢>3д, 🔴<1д)',{urg_green_h:72,urg_yellow_h:48,urg_orange_h:24}),
    opt('стандарт (🟢>2д, 🔴<12ч)',{urg_green_h:48,urg_yellow_h:24,urg_orange_h:12}),
    opt('жёсткие (🟢>1д, 🔴<4ч)',{urg_green_h:24,urg_yellow_h:12,urg_orange_h:4})]);
  document.getElementById('sNag').onclick=()=>openOpts('Пинать при просрочке',Object.keys(NAG).map(v=>opt(NAG[v],{nag_interval_min:v})));
  document.getElementById('sLead').onclick=()=>openOpts('Напоминать заранее',Object.keys(LEAD).map(v=>opt(LEAD[v],{lead_time_min:v})));
  document.getElementById('sTheme').onclick=()=>openOpts('Тема',Object.keys(THEME).map(v=>opt(THEME[v],{theme:v})));
  document.querySelectorAll('.tg2').forEach(t=>t.onclick=()=>{const k=t.dataset.k; saveSettings({[k]: S(k,'1')==='1'?'0':'1'});});
}
function openOpts(title, options){
  document.getElementById('optTitle').textContent=title;
  const el=document.getElementById('optList');
  el.innerHTML=options.map((o,i)=>`<div class="srow optrow" data-i="${i}" style="border-bottom:1px solid #F0EEE7"><span>${o.label}</span></div>`).join('');
  el.querySelectorAll('.optrow').forEach(r=>r.onclick=()=>{ saveSettings(options[+r.dataset.i].patch); document.getElementById('optScrim').classList.remove('on'); });
  document.getElementById('optScrim').classList.add('on');
}
async function saveSettings(patch){
  try{ state.settings=await api('/api/settings',{method:'PUT',body:JSON.stringify(patch)}); if(state.tab==='settings') renderSettings(); }catch(e){}
}
document.getElementById('optCancel').onclick=()=>document.getElementById('optScrim').classList.remove('on');

function chipRow(el, items, getLabel, selected, onSel){
  el.innerHTML=items.map(x=>`<span class="chip ${x===selected?'on':''}" data-v="${x}">${getLabel(x)}</span>`).join('');
  el.querySelectorAll('.chip').forEach(ch=>ch.onclick=()=>{ el.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); ch.classList.add('on'); onSel(ch.dataset.v); });
}
let curCat='', curPrio='P3';
async function openTask(id){
  state.editId=id||null;
  const t=id?state.tasks.find(x=>x.id===id):null;
  document.getElementById('tsTitle').textContent=id?'Задача':'Новая задача';
  document.getElementById('fTitle').value=t?t.title:'';
  curCat=t?t.category:''; curPrio=t?(t.priority||'P3'):S('default_priority','P3');
  chipRow(document.getElementById('fCat'), state.cats.map(c=>c.name), n=>`${catMeta(n).emoji} ${n}`, curCat, v=>curCat=v);
  chipRow(document.getElementById('fPrio'), ['P1','P2','P3','P4','P5'], x=>x, curPrio, v=>curPrio=v);
  document.getElementById('fDue').value=t?(t.due_at?t.due_at.slice(0,16):''):defaultDueLocal();
  document.getElementById('fDelete').style.display=id?'block':'none';
  document.getElementById('cmtWrap').style.display=id?'block':'none';
  document.getElementById('cmtList').innerHTML=''; document.getElementById('cmtInput').value='';
  if(id) loadComments(id);
  document.getElementById('taskScrim').classList.add('on');
}
function closeTask(){ document.getElementById('taskScrim').classList.remove('on'); }
async function loadComments(id){
  try{ const cs=await api('/api/tasks/'+id+'/comments');
    document.getElementById('cmtList').innerHTML=cs.map(c=>`<div class="cmt"><div class="t">${new Date(c.created_at).toLocaleString('ru-RU',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div><div class="b">${esc(c.text)}</div></div>`).join('')||'<div style="color:#B4B2A9;font-size:13px;margin-bottom:8px">Пока нет комментариев.</div>';
  }catch(e){}
}
document.getElementById('cmtAdd').onclick=async()=>{
  const inp=document.getElementById('cmtInput'), text=inp.value.trim(); if(!text||!state.editId) return;
  try{ await api('/api/tasks/'+state.editId+'/comments',{method:'POST',body:JSON.stringify({text})}); inp.value=''; loadComments(state.editId); }catch(e){}
};
document.getElementById('addBtn').onclick=()=>openTask(null);
document.getElementById('fCancel').onclick=closeTask;
document.getElementById('fSave').onclick=async()=>{
  const title=document.getElementById('fTitle').value.trim(); if(!title) return;
  const due=document.getElementById('fDue').value;
  const payload={title,category:curCat,priority:curPrio,due_at:due?due+':00':''};
  try{ if(state.editId) await api('/api/tasks/'+state.editId,{method:'PATCH',body:JSON.stringify(payload)});
       else await api('/api/tasks',{method:'POST',body:JSON.stringify(payload)});
       closeTask(); await load(); }catch(e){}
};
document.getElementById('fDelete').onclick=async()=>{
  if(!state.editId) return;
  try{ await api('/api/tasks/'+state.editId,{method:'DELETE'}); closeTask(); await load(); }catch(e){}
};

let curColor=PALETTE[0];
function openCat(name){
  state.catEdit=name||null; const c=name?catMeta(name):null;
  document.getElementById('csTitle').textContent=name?'Категория':'Новая категория';
  document.getElementById('cName').value=name||''; document.getElementById('cName').disabled=!!name;
  document.getElementById('cEmoji').value=c?c.emoji:''; curColor=c?c.color:PALETTE[0];
  const cc=document.getElementById('cColors');
  cc.innerHTML=PALETTE.map(col=>`<span data-col="${col}" style="width:30px;height:30px;border-radius:50%;background:${col};border:${col===curColor?'3px solid #23221E':'3px solid transparent'}"></span>`).join('');
  cc.querySelectorAll('[data-col]').forEach(s=>s.onclick=()=>{curColor=s.dataset.col;cc.querySelectorAll('[data-col]').forEach(x=>x.style.border='3px solid transparent');s.style.border='3px solid #23221E';});
  document.getElementById('cDelete').style.display=name?'block':'none';
  document.getElementById('catScrim').classList.add('on');
}
function closeCat(){ document.getElementById('catScrim').classList.remove('on'); }
document.getElementById('cCancel').onclick=closeCat;
document.getElementById('cSave').onclick=async()=>{
  const name=document.getElementById('cName').value.trim(), emoji=document.getElementById('cEmoji').value.trim();
  if(!name) return;
  try{ if(state.catEdit) await api('/api/categories/'+encodeURIComponent(name),{method:'PATCH',body:JSON.stringify({emoji,color:curColor})});
       else await api('/api/categories',{method:'POST',body:JSON.stringify({name,emoji,color:curColor})});
       closeCat(); await loadCats(); render(); }catch(e){}
};
document.getElementById('cDelete').onclick=async()=>{
  if(!state.catEdit) return;
  try{ await api('/api/categories/'+encodeURIComponent(state.catEdit),{method:'DELETE'}); closeCat(); await loadCats(); render(); }catch(e){}
};

document.querySelectorAll('nav div').forEach(d=>d.onclick=()=>{state.tab=d.dataset.tab;state.selDay=null;render();});

async function loadCats(){ try{ state.cats=await api('/api/categories'); }catch(e){ state.cats=[]; } }
async function loadSettings(){ try{ state.settings=await api('/api/settings'); }catch(e){ state.settings={}; } }
async function load(){ try{ state.tasks=await api('/api/tasks'); render(); }catch(e){} }
(async()=>{ await loadSettings(); await loadCats(); await load(); })();
</script>
</body>
</html>
