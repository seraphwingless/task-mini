<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Задачи</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{ --line:#ECEAE3; --muted:#8A8880; --bg:#F6F5F1; --accent:#185FA5; --ink:#22211D; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; height:100%; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
        color:var(--ink); background:#fff; display:flex; flex-direction:column; overscroll-behavior:none; }
  header{ padding:16px 18px 12px; position:relative; }
  h1{ font-size:22px; font-weight:600; margin:0; letter-spacing:-.01em; }
  .sub{ font-size:13px; color:var(--muted); margin-top:2px; }
  .add{ position:absolute; top:14px; right:16px; width:34px; height:34px; border-radius:50%;
        background:var(--accent); color:#fff; border:none; font-size:22px; line-height:1;
        display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(24,95,165,.25); }
  .weekbar{ display:flex; align-items:center; justify-content:space-between; padding:2px 18px 6px; }
  .weekbar .rng{ font-size:13px; font-weight:500; }
  .weekbar button{ background:none; border:none; color:#B4B2A9; font-size:20px; padding:2px 8px; }
  .weekscroll{ display:flex; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch;
               scrollbar-width:none; overscroll-behavior-x:contain; }
  .weekscroll::-webkit-scrollbar{ display:none; }
  .weekpage{ flex:0 0 100%; display:grid; grid-template-columns:repeat(7,1fr); gap:4px;
             text-align:center; padding:0 12px 8px; scroll-snap-align:center; }
  .weekpage .wd{ font-size:11px; color:#B7B5AC; }
  .day{ padding:7px 0 5px; border-radius:11px; font-size:15px; margin-top:3px; transition:.12s; }
  .day.sel{ background:var(--accent); color:#fff; font-weight:600; }
  .dot{ width:5px; height:5px; border-radius:50%; margin:3px auto 0; }
  .filters{ display:flex; gap:7px; overflow-x:auto; padding:6px 16px 12px; font-size:13px; scrollbar-width:none; }
  .filters::-webkit-scrollbar{ display:none; }
  .chip{ border:1px solid #DEDCD3; padding:6px 12px; border-radius:22px; white-space:nowrap; background:#fff; color:#4A4842; }
  .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
  main{ flex:1; overflow-y:auto; background:var(--bg); -webkit-overflow-scrolling:touch; }
  #list{ padding:12px 14px 24px; }
  .card{ display:flex; align-items:stretch; background:#fff; border-radius:13px; overflow:hidden;
         margin-bottom:8px; box-shadow:0 1px 2px rgba(20,20,20,.05); transition:.22s; }
  .card:active{ transform:scale(.99); }
  .band{ width:34px; flex:none; color:#fff; display:flex; align-items:center; justify-content:center;
         font-size:13px; font-weight:600; }
  .cbody{ padding:9px 11px; flex:1; min-width:0; }
  .ttl{ font-size:15px; font-weight:500; margin-bottom:3px; line-height:1.2;
        white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .meta{ font-size:12px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ue{ font-size:13px; }
  .dl{ color:var(--muted); }
  .card.done{ background:#EAF7F0; }
  .card.done .ttl{ color:var(--muted); }
  .cb{ width:24px; height:24px; border:2px solid #C9C7BE; border-radius:7px; align-self:center;
       margin:0 12px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:15px; flex:none; }
  .cb.on{ background:#1D9E75; border-color:#1D9E75; }
  .arcbar{ display:flex; gap:7px; margin:2px 2px 12px; }
  .skl{ height:11px; border-radius:6px; margin:5px 0;
        background:linear-gradient(90deg,#EDEBE4,#F7F6F2,#EDEBE4); background-size:200% 100%; animation:sh 1.2s infinite linear; }
  .skl.a{ width:58%; height:13px; } .skl.b{ width:38%; }
  @keyframes sh{ from{ background-position:200% 0 } to{ background-position:-200% 0 } }
  .ghead{ display:flex; align-items:center; gap:6px; font-size:13px; color:#6B6963; font-weight:600; margin:12px 4px 8px; }
  .empty{ text-align:center; color:#B7B5AC; padding:64px 20px; }
  .empty .big{ font-size:40px; margin-bottom:10px; }
  nav{ display:grid; grid-template-columns:repeat(4,1fr); gap:6px; background:#fff; border-top:1px solid var(--line);
       text-align:center; font-size:11px; padding:8px 10px calc(env(safe-area-inset-bottom) + 12px); flex:none; }
  nav div{ color:#9C9A92; padding:7px 2px 6px; border-radius:14px; transition:.15s; font-weight:500; }
  nav div:active{ transform:scale(.94); }
  nav div.on{ color:var(--accent); background:rgba(24,95,165,.10); }
  nav .ic{ font-size:20px; display:block; margin-bottom:3px; line-height:1; }
  html[data-theme="dark"] nav div.on{ background:rgba(90,160,235,.16); color:#7FB4EC; }
  .scrim{ position:fixed; inset:0; background:rgba(15,15,15,.4); display:none; align-items:flex-end; z-index:20; }
  .scrim.on{ display:flex; }
  .panel{ background:#fff; width:100%; border-radius:20px 20px 0 0; padding:18px 18px max(18px, env(safe-area-inset-bottom));
          max-height:92vh; overflow-y:auto; animation:up .22s ease; }
  @keyframes up{ from{ transform:translateY(30px); opacity:.6 } to{ transform:none; opacity:1 } }
  .panel h2{ font-size:18px; margin:0 0 16px; }
  .fld{ margin-bottom:14px; }
  .fld label{ font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.05em; display:block; margin-bottom:7px; font-weight:600; }
  input[type=text], input[type=datetime-local], textarea{ width:100%; padding:12px 13px; border:1px solid #DEDCD3;
         border-radius:12px; font-size:16px; font-family:inherit; background:#fff; color:var(--ink); }
  textarea{ resize:vertical; min-height:44px; line-height:1.4; }
  input:focus, textarea:focus{ outline:none; border-color:var(--accent); }
  .cmt .b{ white-space:pre-wrap; word-break:break-word; }
  .cmt .b a{ color:var(--accent); }
  .duefield{ width:100%; padding:12px 13px; border:1px solid #DEDCD3; border-radius:12px; font-size:16px; background:#fff; color:var(--ink); }
  html[data-theme="dark"] .duefield{ background:#1C1C1E; border-color:#3A3A3C; }
  .wheels{ position:relative; display:flex; gap:8px; height:200px; margin:6px 0 14px; }
  .wheelcol{ flex:1; overflow-y:scroll; scroll-snap-type:y mandatory; text-align:center; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
  .wheelcol::-webkit-scrollbar{ display:none; }
  .wheelcol .wi{ height:40px; line-height:40px; scroll-snap-align:center; font-size:17px; color:var(--muted); white-space:nowrap; }
  .wheelcol .wi.sel{ color:var(--ink); font-weight:600; }
  .wheelcol .pad{ height:80px; }
  .wheelband{ position:absolute; left:0; right:0; top:80px; height:40px; border-top:1px solid var(--accent); border-bottom:1px solid var(--accent); pointer-events:none; opacity:.5; }
  .row{ display:flex; gap:7px; flex-wrap:wrap; }
  .btn{ width:100%; padding:14px; border:none; border-radius:13px; background:var(--accent); color:#fff;
        font-size:16px; font-weight:600; margin-top:6px; }
  .btn.ghost{ background:#F1EFE8; color:#5F5E5A; }
  .btn.danger{ background:#FCEBEB; color:#A32D2D; }
  .cmt{ border-left:2px solid var(--line); padding-left:11px; margin-bottom:12px; }
  .cmt .t{ font-size:11px; color:#B4B2A9; margin-bottom:3px; }
  .cmt .b{ font-size:14px; line-height:1.5; }
  .cmtbar{ display:flex; gap:8px; margin-top:8px; }
  .cmtbar input{ flex:1; }
  .cmtbar button{ width:auto; padding:12px 16px; margin:0; }
  .srow{ display:flex; align-items:center; justify-content:space-between; padding:13px 14px; }
  .sgroup{ background:#fff; border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(20,20,20,.05); }
  .sgroup .srow + .srow{ border-top:1px solid #F0EEE7; }
  .slabel{ font-size:11px; color:#B4B2A9; text-transform:uppercase; letter-spacing:.05em; margin:18px 6px 8px; font-weight:600; }
  .tg{ width:42px; height:25px; border-radius:22px; position:relative; flex:none; transition:.15s; }
  .tg i{ position:absolute; top:2.5px; width:20px; height:20px; border-radius:50%; background:#fff; transition:.15s; }
  .val{ color:var(--muted); font-size:14px; display:flex; align-items:center; gap:6px; }
  html[data-theme="dark"]{ --line:#2C2C2E; --muted:#9A988F; --bg:#0E0E10; --ink:#ECEAE3; }
  html[data-theme="dark"] body{ background:#0E0E10; }
  html[data-theme="dark"] main{ background:#0E0E10; }
  html[data-theme="dark"] .card, html[data-theme="dark"] .sgroup, html[data-theme="dark"] nav,
  html[data-theme="dark"] .panel, html[data-theme="dark"] input, html[data-theme="dark"] textarea{ background:#1C1C1E; color:var(--ink); }
  html[data-theme="dark"] input, html[data-theme="dark"] textarea{ border-color:#3A3A3C; }
  html[data-theme="dark"] .chip{ background:#1C1C1E; color:#ECEAE3; border-color:#3A3A3C; }
  html[data-theme="dark"] .chip.on{ background:var(--accent); color:#fff; }
  html[data-theme="dark"] .card.done{ background:#14261D; }
  html[data-theme="dark"] .skl{ background:linear-gradient(90deg,#232325,#2E2E30,#232325); background-size:200% 100%; }
</style>
</head>
<body>
  <header>
    <h1 id="title">Календарь</h1>
    <div class="sub" id="sub"></div>
    <button class="add" id="addBtn" aria-label="Добавить">+</button>
  </header>
  <div class="weekbar" id="weekbar" style="display:none">
    <button id="wPrev">‹</button><span class="rng" id="wRange"></span><button id="wNext">›</button>
  </div>
  <div class="weekscroll" id="weekScroll" style="display:none"></div>
  <div class="filters" id="filters"></div>

  <main><div id="list"></div></main>

  <nav id="nav">
    <div data-tab="calendar" class="on"><span class="ic">🗓</span>Задачи</div>
    <div data-tab="checklist"><span class="ic">✅</span>Чеклист</div>
    <div data-tab="all"><span class="ic">📋</span>Все</div>
    <div data-tab="settings"><span class="ic">⚙️</span>Настройки</div>
  </nav>

  <div class="scrim" id="taskScrim"><div class="panel">
    <h2 id="tsTitle">Новая задача</h2>
    <div class="fld"><label>Название</label><input type="text" id="fTitle" placeholder="Купить кофе"></div>
    <div id="cmtWrap" style="display:none">
      <div class="fld" style="margin-bottom:6px"><label>Комментарии</label></div>
      <div id="cmtList"></div>
      <div class="cmtbar" style="margin-bottom:14px"><textarea id="cmtInput" rows="2" placeholder="Написать комментарий… (можно несколько строк)"></textarea><button class="btn" id="cmtAdd">→</button></div>
    </div>
    <div class="fld"><label>Категория</label><div class="row" id="fCat"></div></div>
    <div class="fld"><label>Приоритет</label><div class="row" id="fPrio"></div></div>
    <div class="fld"><label>Тип</label><div id="fChkBtn" class="duefield">Обычная задача</div></div>
    <div class="fld taskonly"><label>Дедлайн</label><div id="dueBtn" class="duefield">Сегодня</div></div>
    <div class="fld taskonly"><label>Напоминания</label><div class="row" id="remChips"></div></div>
    <div class="fld taskonly"><label>Пинать при просрочке</label><div id="nagBtn" class="duefield">выключено</div></div>
    <button class="btn" id="fSave" style="margin-top:14px">Сохранить</button>
    <button class="btn ghost" id="fFinish" style="display:none">Закончить (убрать из чеклиста)</button>
    <button class="btn danger" id="fDelete" style="display:none">Удалить задачу</button>
    <button class="btn ghost" id="fCancel">Отмена</button>
  </div></div>

  <div class="scrim" id="catScrim"><div class="panel">
    <h2 id="csTitle">Категория</h2>
    <div class="fld"><label>Название</label><input type="text" id="cName" placeholder="Учёба"></div>
    <div class="fld"><label>Эмодзи</label><input type="text" id="cEmoji" placeholder="📚" maxlength="4"></div>
    <div class="fld"><label>Цвет</label><div class="row" id="cColors"></div></div>
    <button class="btn" id="cSave">Сохранить</button>
    <button class="btn danger" id="cDelete" style="display:none">Удалить категорию</button>
    <button class="btn ghost" id="cCancel">Отмена</button>
  </div></div>

  <div class="scrim" id="optScrim"><div class="panel">
    <h2 id="optTitle">Выбор</h2>
    <div id="optList"></div>
    <button class="btn ghost" id="optCancel" style="margin-top:8px">Отмена</button>
  </div></div>

  <div class="scrim" id="accScrim"><div class="panel">
    <h2>Дать доступ</h2>
    <div class="fld"><label>Telegram ID</label><input type="text" id="accId" inputmode="numeric" placeholder="123456789"></div>
    <div class="fld"><label>Имя (для тебя)</label><input type="text" id="accName" placeholder="Ксения"></div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px">ID человек узнаёт у @userinfobot и присылает тебе.</div>
    <button class="btn" id="accSave">Добавить</button>
    <button class="btn ghost" id="accCancel">Отмена</button>
  </div></div>

  <div class="scrim" id="dueScrim"><div class="panel">
    <h2>Дедлайн</h2>
    <div class="row" style="margin-bottom:6px">
      <span class="chip" id="qToday">Сегодня</span>
      <span class="chip" id="qTomorrow">Завтра</span>
      <span class="chip" id="qNone">Без дедлайна</span>
    </div>
    <div class="wheels">
      <div class="wheelcol" id="wDate"></div>
      <div class="wheelcol" id="wHour"></div>
      <div class="wheelcol" id="wMin"></div>
      <div class="wheelband"></div>
    </div>
    <button class="btn" id="dueDone">Готово</button>
    <button class="btn ghost" id="dueCancel">Отмена</button>
  </div></div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
const PCOL = {P1:'#E24B4A',P2:'#D85A30',P3:'#EF9F27',P4:'#378ADD',P5:'#888780'};
const PALETTE = ['#639922','#378ADD','#1D9E75','#7F77DD','#D85A30','#E24B4A','#EF9F27','#888780'];
const state = { tab:'calendar', tasks:[], archive:[], archiveView:false, cats:[], cat:'', selDay:null,
                weekOff:0, editId:null, catEdit:null, settings:{}, me:null, denied:false };
function S(k, def){ return (state.settings && state.settings[k]!=null && state.settings[k]!=='') ? state.settings[k] : def; }
function todayStr(){ const d=new Date(); const p=n=>String(n).padStart(2,'0'); return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate()); }
function capName(s){ s=(s||'').trim(); return s?s[0].toUpperCase()+s.slice(1):s; }

// ---------- мгновенный старт: кэш последнего состояния ----------
const CKEY = 'tm_cache_v2_' + ((tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user)?tg.initDataUnsafe.user.id:'x');
function saveCache(){
  try{ localStorage.setItem(CKEY, JSON.stringify({tasks:state.tasks,cats:state.cats,settings:state.settings,me:state.me})); }catch(e){}
}
function loadCache(){
  try{ const c=JSON.parse(localStorage.getItem(CKEY)||'null');
    if(c && Array.isArray(c.cats)){ state.tasks=c.tasks||[]; state.cats=c.cats||[]; state.settings=c.settings||{}; state.me=c.me||null; return true; }
  }catch(e){}
  return false;
}
function skeleton(){
  document.getElementById('list').innerHTML = Array.from({length:5},()=>
    `<div class="card"><div class="band" style="background:#DCDAD2"></div><div class="cbody"><div class="skl a"></div><div class="skl b"></div></div></div>`).join('');
}

function catMeta(name){ const c=state.cats.find(x=>x.name===name); return c||{name,emoji:'',color:'#888780'}; }
// Панель всегда открывается с начала, а не там, где её оставили в прошлый раз.
function showScrim(id){
  const s=document.getElementById(id), p=s.querySelector('.panel');
  if(p) p.scrollTop=0;
  s.classList.add('on');
  if(p) requestAnimationFrame(()=>{ p.scrollTop=0; });
}
// Тап по затемнению вне панели закрывает её.
document.querySelectorAll('.scrim').forEach(s=>{
  s.addEventListener('click', e=>{ if(e.target===s) s.classList.remove('on'); });
});

async function api(path, opts={}) {
  const r = await fetch(path, Object.assign({}, opts, { headers: Object.assign({
    'Content-Type':'application/json', 'X-Telegram-Init-Data': tg?tg.initData:'' }, opts.headers||{}) }));
  if (r.status===401||r.status===403){ state.denied=true; lockScreen(); throw new Error(''+r.status); }
  if (!r.ok) throw new Error('api '+r.status);
  const txt = await r.text(); return txt?JSON.parse(txt):null;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function linkify(s){ return esc(s).replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>'); }
function parseDue(s){ if(!s) return null; const d=new Date(s.replace(' ','T')); return isNaN(d)?null:d; }
function absDue(iso){ const d=new Date((iso||'').replace(' ','T')); if(isNaN(d)) return ''; const p=n=>String(n).padStart(2,'0'); return p(d.getDate())+'.'+p(d.getMonth()+1)+' '+p(d.getHours())+':'+p(d.getMinutes()); }
function defaultDueLocal(){ const d=new Date(); d.setHours(d.getHours()+1,0,0,0);
  const p=n=>String(n).padStart(2,'0');
  return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes()); }
// Новая задача наследует дату, выбранную в ленте недель.
function dueForNew(){
  const p=n=>String(n).padStart(2,'0'), today=new Date();
  const sel=(state.tab==='calendar' && state.selDay) ? new Date(state.selDay) : null;
  if(!sel || sel.toDateString()===today.toDateString()) return defaultDueLocal();
  return sel.getFullYear()+'-'+p(sel.getMonth()+1)+'-'+p(sel.getDate())+'T09:00';
}
function urgency(due){
  if(!due) return {text:'',emoji:''};
  const ms=due-new Date();
  if(ms<0) return {text:'просрочено',emoji:'🔥',over:true};
  const m=Math.floor(ms/60000),d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mi=m%60;
  const text=(d?d+'д ':'')+((h||d)?h+'ч ':'')+mi+'м';
  const gh=+S('urg_green_h',48)*3600000, yh=+S('urg_yellow_h',24)*3600000, oh=+S('urg_orange_h',12)*3600000;
  const emoji=ms>gh?'🟢':ms>yh?'🟡':ms>oh?'🟠':'🔴';
  return {text,emoji};
}

function cardHTML(t){
  const c=catMeta(t.category), p=t.priority||'P3';
  const isDone=t.status==='done', isCL=t.checklist==='1';
  const checked=isCL && t.checked_date===todayStr();
  const catHTML=t.category?`<span style="color:${c.color};font-weight:500">${c.emoji} ${esc(t.category)}</span>`:'';
  let meta, cb;
  if(isDone){
    meta=[catHTML, t.completed_at?`<span class="dl">✓ ${absDue(t.completed_at)}</span>`:''].filter(Boolean).join(' · ');
    cb='';
  } else if(isCL){
    meta=catHTML || '<span class="dl">каждый день</span>';
    cb=`<div class="cb ${checked?'on':''}" data-check="${t.id}">${checked?'✓':''}</div>`;
  } else {
    const u=urgency(parseDue(t.due_at));
    const dl=t.due_at?`<span class="dl" style="color:${u.over?'#E0524F':'var(--muted)'}">📅 ${absDue(t.due_at)} · ${u.text}</span>`:'';
    meta=(t.due_at?`<span class="ue">${u.emoji}</span> `:'')+[catHTML,dl].filter(Boolean).join(' · ');
    cb=`<div class="cb" data-done="${t.id}"></div>`;
  }
  return `<div class="card ${isDone||checked?'done':''}" data-id="${t.id}">
    <div class="band" style="background:${PCOL[p]||'#888780'}">${p}</div>
    <div class="cbody" data-open="${t.id}">
      <div class="ttl">${esc(t.title)}</div>
      <div class="meta">${meta}</div>
    </div>
    ${cb}
  </div>`;
}
function bind(){
  document.querySelectorAll('[data-done]').forEach(cb=>cb.onclick=async e=>{
    e.stopPropagation(); const id=cb.getAttribute('data-done');
    cb.classList.add('on'); cb.textContent='✓';
    try{ await api('/api/tasks/'+id+'/done',{method:'POST'}); state.tasks=state.tasks.filter(t=>t.id!==id); saveCache();
      const card=cb.closest('.card'); card.style.opacity='0'; card.style.transform='translateX(14px)'; setTimeout(render,220);
    }catch(err){ cb.classList.remove('on'); cb.textContent=''; }
  });
  document.querySelectorAll('[data-check]').forEach(cb=>cb.onclick=async e=>{
    e.stopPropagation(); const id=cb.getAttribute('data-check');
    const t=state.tasks.find(x=>x.id===id); if(!t) return;
    const wasChecked=t.checked_date===todayStr(); const nv=wasChecked?'':todayStr();
    cb.classList.toggle('on',!wasChecked); cb.textContent=wasChecked?'':'✓';
    cb.closest('.card').classList.toggle('done',!wasChecked);
    try{ await api('/api/tasks/'+id,{method:'PATCH',body:JSON.stringify({checked_date:nv})}); t.checked_date=nv; saveCache(); }
    catch(err){ cb.classList.toggle('on',wasChecked); cb.textContent=wasChecked?'✓':''; }
  });
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>openTask(el.getAttribute('data-open')));
}
function byPrio(a,b){
  const o=x=>{const d=parseDue(x.due_at);return d&&d<new Date()?0:1;};
  const da=a.due_at||'9999', db=b.due_at||'9999';
  return o(a)-o(b) || (a.priority||'P3').localeCompare(b.priority||'P3') || (da<db?-1:da>db?1:0);
}
function visible(){ let t=state.tasks.slice(); if(state.cat) t=t.filter(x=>x.category===state.cat); return t; }

      body=Object.keys(g).map(k=>`<div class="ghead">${catMeta(k).emoji} ${k} · ${g[k].length}</div>`+g[k].sort(byPrio).map(cardHTML).join('')).join(''); }
  }
  list.innerHTML=toggle+body;

  document.getElementById('arcArchive').onclick=async()=>{
    try{ state.archive=await api('/api/archive'); }catch(e){ state.archive=[]; }

// ---------- лента недель: настоящий горизонтальный скролл ----------
const WMIN=-26, WMAX=52;
function mondayFor(off){
  const b=new Date(); b.setHours(0,0,0,0); b.setDate(b.getDate()+off*7);
  const m=new Date(b); m.setDate(b.getDate()-((b.getDay()+6)%7)); return m;
}
function weekLabel(){
  const mon=mondayFor(state.weekOff), end=new Date(mon); end.setDate(mon.getDate()+6);
  document.getElementById('wRange').textContent=mon.getDate()+'–'+end.getDate()+' '+end.toLocaleDateString('ru-RU',{month:'long'});
}
function dayHasTasks(d){ return state.tasks.some(t=>{const td=parseDue(t.due_at);return td&&td.toDateString()===d.toDateString();}); }
function renderWeekPages(){
  const sc=document.getElementById('weekScroll');
  const names=['Пн','Вт','Ср','Чт','Пт','Сб','Вс'], sel=state.selDay||new Date(), today=new Date();
  let h='';
  for(let off=WMIN; off<=WMAX; off++){
    const mon=mondayFor(off); h+='<div class="weekpage">';
    for(let i=0;i<7;i++){ const d=new Date(mon); d.setDate(mon.getDate()+i);
      const has=dayHasTasks(d);
      const isSel=d.toDateString()===sel.toDateString(), isToday=d.toDateString()===today.toDateString();
      h+=`<div><div class="wd">${names[i]}</div><div class="day ${isSel?'sel':''}" data-day="${d.toISOString()}" style="${isToday&&!isSel?'color:var(--accent)':''}">${d.getDate()}<div class="dot" style="background:${has?(isSel?'#fff':'#378ADD'):'transparent'}"></div></div></div>`;
    }
    h+='</div>';
  }
  sc.innerHTML=h;
  sc.querySelectorAll('.day').forEach(el=>el.onclick=()=>{ state.selDay=new Date(el.dataset.day); markSelDay(); renderCalList(); });
  scrollToWeek(state.weekOff,false);
}
function scrollToWeek(off, smooth){
  const sc=document.getElementById('weekScroll'); const w=sc.clientWidth; if(!w) return;
  sc._lock=true;
  sc.scrollTo({left:(off-WMIN)*w, behavior:smooth?'smooth':'auto'});
  setTimeout(()=>{ sc._lock=false; }, smooth?450:80);
}
function markSelDay(){
  const sel=state.selDay;
  document.querySelectorAll('#weekScroll .day').forEach(el=>{
    const d=new Date(el.dataset.day), on=sel&&d.toDateString()===sel.toDateString();
    el.classList.toggle('sel',on);
    const dot=el.querySelector('.dot');
    if(dot) dot.style.background = dayHasTasks(d) ? (on?'#fff':'#378ADD') : 'transparent';
  });
}
function renderCalList(){
  const list=document.getElementById('list');
  const sel=state.selDay||new Date();
  let items=visible().filter(t=>t.checklist!=='1')
    .filter(t=>{const d=parseDue(t.due_at);return d&&d.toDateString()===sel.toDateString();});
  if(!items.length){ list.innerHTML='<div class="empty"><div class="big">🗒️</div>Задач нет</div>'; return; }
  items.sort(byPrio); list.innerHTML=items.map(cardHTML).join(''); bind();
}
function gotoWeek(off, smooth){
  state.weekOff=off;
  const mon=mondayFor(off), today=new Date();
  const endW=new Date(mon); endW.setDate(mon.getDate()+7);
  state.selDay = (today>=mon && today<endW) ? today : mon;
  weekLabel(); markSelDay(); renderCalList();
  if(smooth!==null) scrollToWeek(off, smooth);
}
document.getElementById('wPrev').onclick=()=>gotoWeek(state.weekOff-1,true);
document.getElementById('wNext').onclick=()=>gotoWeek(state.weekOff+1,true);
(function(){
  const sc=document.getElementById('weekScroll');
  sc.addEventListener('scroll',()=>{
    if(sc._lock) return;
    clearTimeout(sc._t);
    sc._t=setTimeout(()=>{
      const w=sc.clientWidth; if(!w) return;
      const off=Math.round(sc.scrollLeft/w)+WMIN;
      if(off!==state.weekOff) gotoWeek(off,null);
    },110);
  },{passive:true});
})();

// ---------- iOS-style date/time wheels ----------
const MON=['янв','фев','мар','апр','мая','июн','июл','авг','сен','окт','ноя','дек'];
const WD=['вс','пн','вт','ср','чт','пт','сб'];
const p2=n=>String(n).padStart(2,'0');
const DUE_DATES=(()=>{ const a=[], base=new Date(); base.setHours(0,0,0,0);
  for(let i=-30;i<=400;i++){ const d=new Date(base); d.setDate(base.getDate()+i);
    const val=d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate());
    const label=i===0?'Сегодня':i===1?'Завтра':WD[d.getDay()]+', '+d.getDate()+' '+MON[d.getMonth()];
    a.push({val,label}); } return a; })();
const HOURS=Array.from({length:24},(_,i)=>p2(i));
const MINS=Array.from({length:60},(_,i)=>p2(i));
function updateDueBtn(){ const el=document.getElementById('dueBtn');
  if(!curDue){ el.textContent='Без дедлайна'; el.style.color='var(--muted)'; return; }
  const d=new Date(curDue); el.style.color='var(--ink)';
  el.textContent=p2(d.getDate())+'.'+p2(d.getMonth()+1)+'.'+d.getFullYear()+', '+p2(d.getHours())+':'+p2(d.getMinutes()); }
function wheelIndex(el){ return Math.max(0, Math.round(el.scrollTop/40)); }
function markWheel(el){ const i=wheelIndex(el); el.querySelectorAll('.wi').forEach((w,j)=>w.classList.toggle('sel',j===i)); }
function buildWheel(el, items, sel){ el.innerHTML='<div class="pad"></div>'+items.map(t=>'<div class="wi">'+t+'</div>').join('')+'<div class="pad"></div>';
  el.scrollTop=sel*40; markWheel(el); el.onscroll=()=>{ clearTimeout(el._t); el._t=setTimeout(()=>markWheel(el),70); }; }
function openDue(){
  showScrim('dueScrim');
  setTimeout(()=>{ const base=curDue?new Date(curDue):new Date();
    const dval=base.getFullYear()+'-'+p2(base.getMonth()+1)+'-'+p2(base.getDate());
    let di=DUE_DATES.findIndex(x=>x.val===dval); if(di<0) di=30;
    buildWheel(document.getElementById('wDate'), DUE_DATES.map(x=>x.label), di);
    buildWheel(document.getElementById('wHour'), HOURS, base.getHours());
    buildWheel(document.getElementById('wMin'), MINS, base.getMinutes());
  }, 30);
}
function scrollDateTo(off){ const el=document.getElementById('wDate'); el.scrollTop=(30+off)*40; setTimeout(()=>markWheel(el),60); }
document.getElementById('dueBtn').onclick=openDue;
document.getElementById('qToday').onclick=()=>scrollDateTo(0);
document.getElementById('qTomorrow').onclick=()=>scrollDateTo(1);
document.getElementById('qNone').onclick=()=>{ curDue=''; updateDueBtn(); document.getElementById('dueScrim').classList.remove('on'); };
document.getElementById('dueCancel').onclick=()=>document.getElementById('dueScrim').classList.remove('on');
document.getElementById('dueDone').onclick=()=>{
  const d=DUE_DATES[Math.min(wheelIndex(document.getElementById('wDate')),DUE_DATES.length-1)];
  const hh=HOURS[Math.min(wheelIndex(document.getElementById('wHour')),23)];
  const mm=MINS[Math.min(wheelIndex(document.getElementById('wMin')),59)];
  curDue=d.val+'T'+hh+':'+mm; updateDueBtn(); document.getElementById('dueScrim').classList.remove('on');
};

let curColor=PALETTE[0];
function openCat(name){
  state.catEdit=name||null; const c=name?catMeta(name):null;
  document.getElementById('csTitle').textContent=name?'Категория':'Новая категория';
  document.getElementById('cName').value=name||''; document.getElementById('cName').disabled=false;
  document.getElementById('cEmoji').value=c?c.emoji:''; curColor=c?c.color:PALETTE[0];
  const cc=document.getElementById('cColors');
  cc.innerHTML=PALETTE.map(col=>`<span data-col="${col}" style="width:30px;height:30px;border-radius:50%;background:${col};border:${col===curColor?'3px solid #23221E':'3px solid transparent'}"></span>`).join('');
  cc.querySelectorAll('[data-col]').forEach(s=>s.onclick=()=>{curColor=s.dataset.col;cc.querySelectorAll('[data-col]').forEach(x=>x.style.border='3px solid transparent');s.style.border='3px solid #23221E';});
  document.getElementById('cDelete').style.display=name?'block':'none';
  showScrim('catScrim');
}
function closeCat(){ document.getElementById('catScrim').classList.remove('on'); }
document.getElementById('cCancel').onclick=closeCat;
document.getElementById('cSave').onclick=async()=>{
  const name=capName(document.getElementById('cName').value), emoji=document.getElementById('cEmoji').value.trim();
  if(!name) return;
  try{ if(state.catEdit) await api('/api/categories/'+encodeURIComponent(state.catEdit),{method:'PATCH',body:JSON.stringify({name,emoji,color:curColor})});
       else await api('/api/categories',{method:'POST',body:JSON.stringify({name,emoji,color:curColor})});
       if(state.cat===state.catEdit) state.cat=name;
       closeCat(); await loadCats(); await load(); }catch(e){}
};
document.getElementById('cDelete').onclick=async()=>{
  if(!state.catEdit) return;
  try{ await api('/api/categories/'+encodeURIComponent(state.catEdit),{method:'DELETE'}); closeCat(); await loadCats(); render(); }catch(e){}
};

document.querySelectorAll('nav div').forEach(d=>d.onclick=()=>{state.tab=d.dataset.tab;state.selDay=null;state.archiveView=false;render();});

async function loadCats(){ try{ state.cats=await api('/api/categories'); saveCache(); }catch(e){} }
async function load(){ try{ state.tasks=await api('/api/tasks'); saveCache(); render(); }catch(e){} }

// ---------- старт: сразу рисуем из кэша, потом тихо обновляем ----------
(async()=>{
  const cached = loadCache();
  applyTheme();
  if(cached) render(); else skeleton();
  try{
    const b = await api('/api/bootstrap');
    state.me=b.me; state.settings=b.settings; state.cats=b.cats; state.tasks=b.tasks;
    applyTheme(); saveCache(); render();
  }catch(e){
    if(!cached && !state.denied)
      document.getElementById('list').innerHTML='<div class="empty"><div class="big">📡</div>Нет связи. Потяни вниз, чтобы обновить.</div>';
  }
})();
</script>
